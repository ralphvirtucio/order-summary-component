<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Order summary card</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section>
        <div class="container">
          <div class="card-container">
            <h1 class="card-heading">Order Summary</h1>
            <p class="card-description">
              You can now listen to millions of songs, audiobooks, and podcasts
              on any device anywhere you like!
            </p>
            <div class="card-pricing-plan">
              <h3>Annual Plan</h3>
              <p class="price">$59.99/year</p>
              <a href="#" class="change-option"> Change</a>
            </div>
            <button class="btn btn--proceed-payment">Proceed to Payment</button>
            <button class="btn btn--cancel">Cancel Order</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
