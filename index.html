<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Order summary card</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="container">
    <main class="card-container">
      <img
        src="./images/illustration-hero.svg"
        alt="Person listening music from a phone"
        class="header-image"
      />
      <div class="content">
        <h1 class="card-heading">Order Summary</h1>
        <p class="card-description">
          You can now listen to millions of songs, audiobooks, and podcasts on
          any device anywhere you like!
        </p>
        <div class="card-pricing-plan">
          <div class="pricing-plan">
            <img
              src="images/icon-music.svg"
              alt="Music logo"
              class="music-icon"
            />
            <div>
              <p class="pricing-name">Annual Plan</p>
              <p class="price">$59.99/year</p>
            </div>
          </div>
          <div>
            <a href="#" class="change-option"> Change</a>
          </div>
        </div>
        <button class="btn btn--proceed-payment">Proceed to Payment</button>
        <button class="btn btn--cancel">Cancel Order</button>
      </div>
    </main>
  </body>
</html>
